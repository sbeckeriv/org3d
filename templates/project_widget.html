<div id="project-widget" style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">
  <strong>Project:</strong>
  {% if project_name %}
  <span style="color:var(--text);margin-left:.4rem">{{ project_name }}</span>
  <button style="margin-left:.5rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:.15rem .4rem;cursor:pointer;font-size:.75rem"
    hx-delete="/api/model/{{ m_id }}/project"
    hx-target="#project-widget"
    hx-swap="outerHTML">Remove</button>
  {% else %}
  <form style="display:inline-flex;gap:.4rem;align-items:center;margin-left:.4rem"
    hx-post="/api/model/{{ m_id }}/project"
    hx-target="#project-widget"
    hx-swap="outerHTML"
    hx-ext="json-enc">
    <div style="position:relative;display:inline-block">
      <input name="name" autocomplete="off" placeholder="Project name…"
        style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.25rem .5rem;border-radius:4px;font-size:.8rem;width:180px"
        oninput="projFilter(this)" onfocus="projFilter(this)"
        onblur="setTimeout(projClose, 150)">
      <div style="display:none;position:absolute;top:100%;left:0;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:180px;max-height:200px;overflow-y:auto;margin-top:2px;box-shadow:0 4px 16px rgba(0,0,0,.5)">
        {% for p in projects %}
        <div class="popt" data-v="{{ p.name }}"
          style="padding:.35rem .6rem;cursor:pointer;font-size:.82rem"
          onmouseenter="this.style.background='rgba(108,99,255,.15)'"
          onmouseleave="this.style.background=''"
          onmousedown="projPick(this)">{{ p.name }}</div>
        {% endfor %}
      </div>
    </div>
    <button type="submit" style="background:var(--accent);border:none;color:#fff;padding:.25rem .6rem;border-radius:4px;cursor:pointer;font-size:.8rem">Assign</button>
  </form>
  <script>
  function projFilter(inp) {
    var drop = inp.nextElementSibling;
    var v = inp.value.toLowerCase();
    var shown = 0;
    drop.querySelectorAll('.popt').forEach(function(o) {
      var match = !v || o.dataset.v.toLowerCase().indexOf(v) !== -1;
      o.style.display = match ? '' : 'none';
      if (match) shown++;
    });
    drop.style.display = shown ? 'block' : 'none';
  }
  function projClose() {
    var inp = document.querySelector('#project-widget input[name="name"]');
    if (inp) inp.nextElementSibling.style.display = 'none';
  }
  function projPick(opt) {
    var drop = opt.parentElement;
    drop.previousElementSibling.value = opt.dataset.v;
    drop.style.display = 'none';
  }
  </script>
  {% endif %}
</div>
