name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --package org3d

      - name: Clippy
        run: cargo clippy --package org3d -- -D warnings

      - name: Test
        run: cargo test --package org3d

      - name: Check Tauri app (Linux)
        run: cargo check --package org3d-app
